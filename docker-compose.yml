services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-app
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: springboot-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
