<!DOCTYPE html>
<html lang="en">
<head>
    <title>GraphiQL</title>
    <style>
        body { height: 100%; margin: 0; width: 100%; overflow: hidden; }
        #graphiql { height: 100vh; }
    </style>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/graphiql@2.4.7/graphiql.min.js" crossorigin></script>
    <link rel="stylesheet" href="https://unpkg.com/graphiql@2.4.7/graphiql.min.css" />
    <script src="https://unpkg.com/@graphiql/plugin-explorer@0.3.4/dist/index.umd.js" crossorigin></script>
    <link rel="stylesheet" href="https://unpkg.com/@graphiql/plugin-explorer@0.3.4/dist/style.css" />
</head>
<body>
<div id="graphiql">Loading...</div>
<script>
    const url = `${location.protocol}//${location.host}/graphql`;
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const subscriptionUrl = `${wsProtocol}//${location.host}/graphql`;
    const fetcher = GraphiQL.createFetcher({ url, subscriptionUrl });
    const explorerPlugin = GraphiQLPluginExplorer.explorerPlugin();
    ReactDOM.render(
        React.createElement(GraphiQL, {
            fetcher: fetcher,
            defaultVariableEditorOpen: true,
            headerEditorEnabled: true,
            shouldPersistHeaders: true,
            plugins: [explorerPlugin]
        }),
        document.getElementById('graphiql'),
    );
</script>
</body>
</html>
